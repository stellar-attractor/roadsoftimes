<!-- ═══════════════════════════════════════════════════════════════
  ВИДЖЕТ: Рекомендуемый музей
  Где вставлять: Blogger → Макет → блок «Рекомендуемый музей»
                 (находится под постами в левой колонке) → карандашик
  CSS-классы определены в теме (build_template.py → NEW_CSS).

  Что менять при смене музея:
    - src у <img>  — ссылка на фото (лучше из Blogger CDN)
    - rot-museum-label  — город, страна
    - rot-museum-title  — название музея
    - rot-museum-desc   — короткое описание
    - rot-stat-val      — вход / часы / год основания
    - href у кнопки «Подробнее» — ссылка на пост-обзор
═══════════════════════════════════════════════════════════════ -->

<div class="rot-featured-museum">
  <div class="rot-block-header">
    <span class="rot-section-title" style="font-size:13px">Рекомендуемый музей</span>
    <a class="rot-section-link" href="#">Все музеи →</a>
  </div>
  <div class="rot-museum-inner">

    <div class="rot-museum-photo">
      <img alt="Museum"
           src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjbsy8z3wff5_j9tPETK3zwahsqLASMPsKRbryw2-8OoaPkETCWeb4j5M3-5BX9yCBjAeMtiwUnflD4AFTVgzrsceThG-2AZXt6YMd1hq7PzAPmf6NIlLsgieCrMW0HOMVMnIjxGfAbUR00v2hkKL34aKDS6ffdgIvXZPLiHTlID3xC1TCcdrtFy-6OhBQ/s2304/IMG_20260601_104857761_HDR.jpg"/>
    </div>

    <div class="rot-museum-body">
      <div>
        <p class="rot-museum-label">📍 Мюнстер, Германия</p>
        <h3 class="rot-museum-title">Deutsches Panzermuseum Munster</h3>
        <p class="rot-museum-desc">
          Одно из крупнейших танковых музеев мира.
          Более 300 единиц техники.
        </p>
      </div>
      <div>
        <div class="rot-museum-stats">
          <div class="rot-stat">
            <span class="rot-stat-icon">🎟</span>
            <span class="rot-stat-val">бесплатно</span>
            <span class="rot-stat-label">вход</span>

          <div class="rot-stat">

          <div class="rot-stat">
            <span class="rot-stat-icon">📅</span>
            <span class="rot-stat-val">1971</span>
            <span class="rot-stat-label">основан</span>
          </div>
        </div>
        <a class="rot-btn rot-btn-outline rot-museum-link" href="#"
           style="font-size:12px;padding:8px 18px;position:relative;z-index:2">Подробнее ›</a>
      </div>
    </div>

  </div>
</div>
