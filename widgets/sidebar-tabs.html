<!-- ═══════════════════════════════════════════════════════════════
  ВИДЖЕТ: Метки / Архив (HTML10)
  Blogger → Макет → «МеткиАрхив» → карандашик
═══════════════════════════════════════════════════════════════ -->

<div class="rot-tabs-widget">
  <div class="rot-tabs-nav">
    <button class="rot-tab-active" id="rot-btn-labels" onclick="rotTab(this,'sidebartab2')">Метки</button>
    <button id="rot-btn-archive" onclick="rotTab(this,'sidebartab3')">Архив</button>
  </div>
</div>

<script>
function rotTab(btn, showId) {
  btn.parentNode.querySelectorAll('button').forEach(function(b) {
    b.classList.remove('rot-tab-active');
  });
  btn.classList.add('rot-tab-active');
  ['sidebartab2','sidebartab3'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = (id === showId) ? 'block' : 'none';
  });
  try { localStorage.setItem('rot-sidebar-tab', showId); } catch(e) {}
}

window.addEventListener('load', function() {
  var saved;
  try { saved = localStorage.getItem('rot-sidebar-tab'); } catch(e) {}
  var active = saved || 'sidebartab2';

  ['sidebartab2','sidebartab3'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = (id === active) ? 'block' : 'none';
  });

  if (active === 'sidebartab3') {
    document.getElementById('rot-btn-labels').classList.remove('rot-tab-active');
    document.getElementById('rot-btn-archive').classList.add('rot-tab-active');
  }

  // Исправляем месяцы (родительный → именительный) + добавляем счётчик
  var months = {
    'января':'январь',
    'февраля':'февраль',
    'марта':'март',
    'апреля':'апрель',
    'мая':'май',
    'июня':'июнь',
    'июля':'июль',
    'августа':'август',
    'сентября':'сентябрь',
    'октября':'октябрь',
    'ноября':'ноябрь',
    'декабря':'декабрь'
  };
  document.querySelectorAll('#sidebartab3 ul.hierarchy li.archivedate').forEach(function(li) {
    var link = li.querySelector('a.post-count-link');
    var countEl = li.querySelector('span.post-count');
    if (!link) return;
    var text = link.textContent.trim().toLowerCase();
    if (months[text]) {
      var count = countEl ? countEl.textContent.replace(/[()]/g,'').trim() : '';
      link.textContent = months[text] + (count ? ' (' + count + ')' : '');
    }
  });

  // Toggle архива
  document.querySelectorAll('#sidebartab3 a.toggle').forEach(function(btn) {
    // Устанавливаем исходный символ (Blogger может рендерить &#9660; как текст)
    var zippy = btn.querySelector('span');
    if (zippy) zippy.innerHTML = '&#9660;';

    btn.addEventListener('click', function(e) {
      e.preventDefault();
      var li = btn.parentNode;
      var ul = li.querySelector('ul');
      if (!ul) return;
      var collapsed = ul.classList.toggle('rot-collapsed');
      var z = btn.querySelector('span');
      if (z) z.innerHTML = collapsed ? '&#9658;' : '&#9660;';
    });
  });
});
</script>
