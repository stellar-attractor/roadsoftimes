<!-- ═══════════════════════════════════════════════════════════════
  ВИДЖЕТ: Метки / Архив (HTML10)
  Blogger → Макет → «МеткиАрхив» → карандашик
  Управляет видимостью sidebartab2 (Метки) и sidebartab3 (Архив).
  Сами виджеты остаются на месте — JS тогглы архива работают.
═══════════════════════════════════════════════════════════════ -->

<div class="rot-tabs-widget" id="rot-tabs-main">
  <div class="rot-tabs-nav">
    <button class="rot-tab-active" onclick="rotTab(this,'sidebartab2')">Метки</button>
    <button onclick="rotTab(this,'sidebartab3')">Архив</button>
  </div>
</div>

<script>
function rotTab(btn, showId) {
  // Переключаем кнопки
  btn.parentNode.querySelectorAll('button').forEach(function(b) {
    b.classList.remove('rot-tab-active');
  });
  btn.classList.add('rot-tab-active');
  // Показываем нужный таб, скрываем остальные
  ['sidebartab2','sidebartab3'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.style.display = (id === showId) ? 'block' : 'none';
  });
}

document.addEventListener('DOMContentLoaded', function() {
  // Вырезаем sidebartab2 и sidebartab3 из GameTown-обёртки
  // и вставляем их прямо в наш виджет
  var container = document.getElementById('rot-tabs-main');
  if (!container) return;

  ['sidebartab2','sidebartab3'].forEach(function(id, i) {
    var el = document.getElementById(id);
    if (!el) return;
    // Убираем родительские GameTown-обёртки (widget-container, tabviewsection)
    el.style.display = (i === 0) ? 'block' : 'none';
    el.style.padding = '0';
    container.appendChild(el);
  });

  // Скрываем теперь пустую GameTown таб-обёртку
  var tabview = document.querySelector('.tabviewsection');
  if (tabview) tabview.style.display = 'none';
});
</script>
