<!-- ═══════════════════════════════════════════════════════════════
  ВИДЖЕТ: Метки / Архив (HTML10)
  Blogger → Макет → «МеткиАрхив» → карандашик
  НЕ перемещает DOM-узлы — только показывает/скрывает sidebartab2/3.
  Blogger-тогглы архива работают т.к. элементы остаются на месте.
═══════════════════════════════════════════════════════════════ -->

<div class="rot-tabs-widget">
  <div class="rot-tabs-nav">
    <button class="rot-tab-active" onclick="rotTab(this,'sidebartab2')">Метки</button>
    <button onclick="rotTab(this,'sidebartab3')">Архив</button>
  </div>
</div>

<script>
function rotTab(btn, showId) {
  btn.parentNode.querySelectorAll('button').forEach(function(b) {
    b.classList.remove('rot-tab-active');
  });
  btn.classList.add('rot-tab-active');
  ['sidebartab2','sidebartab3'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = (id === showId) ? 'block' : 'none';
  });
  try { localStorage.setItem('rot-sidebar-tab', showId); } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
  // Скрываем GameTown таб-обёртку, оставляя sidebartab2/3 на месте
  var wrap = document.querySelector('#rsidebar-wrapper .widget-container .tabviewsection');
  if (wrap) wrap.parentNode.style.cssText = 'padding:0;margin:0;border:none;background:none';

  // Восстанавливаем сохранённый таб
  var saved;
  try { saved = localStorage.getItem('rot-sidebar-tab'); } catch(e) {}
  var initial = saved || 'sidebartab2';

  ['sidebartab2','sidebartab3'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
      el.style.display = (id === initial) ? 'block' : 'none';
      // Убираем GameTown-отступы с родителей
      if (el.parentNode) el.parentNode.style.cssText = 'padding:0;margin:0';
    }
  });

  // Подсвечиваем активную кнопку по сохранённому значению
  if (saved === 'sidebartab3') {
    var btns = document.querySelectorAll('.rot-tabs-nav button');
    if (btns[0]) btns[0].classList.remove('rot-tab-active');
    if (btns[1]) btns[1].classList.add('rot-tab-active');
  }
});
</script>
