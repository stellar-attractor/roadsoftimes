<script>
//<![CDATA[
(function(){
  var APP_CDN   = 'https://cdn.roadsoftimes.com';   // code / html / json manifests
  var MEDIA_CDN = 'https://media.roadsoftimes.com'; // webm / png / jpg / svg assets
  var EXHIBIT  = 'https://roadsoftimes.blogspot.com/p/exhibit.html';
  var DB       = APP_CDN + '/infographics.json';
  var PER_PAGE = 12;
  var all = [], filtered = [], currentPage = 1;
  var currentView = 'grid';
  var colSort = { key: null, dir: 1 };
  try { currentView = localStorage.getItem('rot-catalog-view') || 'grid'; } catch(e){}

  _loadMuseumSlugs().then(function(){
    fetch(DB).then(function(r){ return r.json(); }).then(function(data){
      all = data.map(function(r,i){ return Object.assign({_idx:i}, r); });
      all.forEach(function(r){ _recById[r.id] = r; });
      populateFilters();
      applyView(currentView);
      render();
    });
  });

  window.rcSetView = function(v){
    currentView = v;
    try { localStorage.setItem('rot-catalog-view', v); } catch(e){}
    applyView(v); renderPage();
  };

  function applyView(v){
    var isStats = v === 'stats';
    document.getElementById('rc-container').className = 'container view-' + (isStats ? 'grid' : v);
    document.getElementById('rc-container').style.display = isStats ? 'none' : '';
    document.getElementById('rc-pagination').style.display = isStats ? 'none' : '';

  function _makeDropdown(wrapId, placeholder, vals, flagMap, flagImgId){

    var list    = wrap.querySelector('.rc-flag-drop');
    var flagImg = flagImgId ? document.getElementById(flagImgId) : null;
    var current = '';

    function _set(val, label, src){
      current = val;
      trigger.textContent = label || placeholder;
      if (flagImg) {
        if (val && src) {
          flagImg.style.backgroundImage = 'url(' + MEDIA_CDN + '/' + src + ')';
          flagImg.style.display = 'block';
        } else {
          flagImg.style.display = 'none';
        }
      }
      list.querySelectorAll('.rc-flag-opt').forEach(function(li){
        li.classList.toggle('selected', li.dataset.value === val);
      });
      wrap.classList.remove('open');
      render();
    }

    list.querySelector('[data-value=""]').addEventListener('click', function(){ _set('', placeholder, ''); });

    var OPT_STYLE = 'display:flex;align-items:center;gap:8px;padding:2px 10px;margin:0;line-height:1;font-size:12px;cursor:pointer;white-space:nowrap;color:#c8c0a8;';
    vals.forEach(function(v){
      var li  = document.createElement('div');
      li.className    = 'rc-flag-opt';
      li.dataset.value = v;
      li.style.cssText = OPT_STYLE;
      var src = flagMap && flagMap[v] || '';
      li.textContent = v;
      li.addEventListener('click', function(){ _set(v, v, src); });
      list.appendChild(li);
    });

    trigger.addEventListener('click', function(e){
      e.stopPropagation();
      document.querySelectorAll('.rc-flag-sel.open').forEach(function(w){ if (w !== wrap) w.classList.remove('open'); });
      wrap.classList.toggle('open');

    return { get: function(){ return current; }, set: _set };

  function render(){
    var q    = gval('rc-title');
    var qobj = gval('rc-object-q');
    var qttx = gval('rc-ttx');
    var qdesc= gval('rc-desc');
    var country  = _countrySel  ? _countrySel.get()  : '';
    var cat      = _categorySel ? _categorySel.get() : '';
    var sort     = document.getElementById('rc-sort').value;

    var preQuick = all.filter(function(r){
      if (q    && !(r.title||'').toLowerCase().includes(q) && !(r.id||'').toLowerCase().includes(q)) return false;
      if (qobj && !(r.Object||'').toLowerCase().includes(qobj)) return false;
      var tx = qttx || qdesc ? textOf(r) : null;
      if (qttx && !tx.ttx.includes(qttx)) return false;
      if (qdesc && !tx.desc.includes(qdesc)) return false;
      var museum = _museumSel ? _museumSel.get() : '';
      if (museum  && (r.Museum||'')   !== museum)  return false;
      if (country && (r.Country||'')  !== country) return false;
      if (cat     && (r.Category||'') !== cat)     return false;
      return true;
    });

    _updateQuickCounts(preQuick);

    filtered = (_quickType
      ? preQuick.filter(function(r){ return r.Object === _quickType; })
      : preQuick
    ).sort(function(a, b){
      var da = a.date || '', db = b.date || '';
      if (da || db) return sort === 'asc' ? da.localeCompare(db) : db.localeCompare(da);
      return sort === 'asc' ? a._idx - b._idx : b._idx - a._idx;

    renderPage();

  /* ŌöĆŌöĆ STATS ŌöĆŌöĆ */
  var DONUT_COLORS = [
    '#c9a84c','#7ab0b0','#b07a7a','#7ab07a','#b07ab0',
    '#7a9ab0','#b0967a','#8ab07a','#b07a96','#7ab0a0',
    '#a0b07a','#b08a7a','#7a8ab0','#b0a07a','#7ab0b8'
  ];

  function pngSrc(r){
    var src = r.zones && r.zones.exhibit_video && r.zones.exhibit_video.source_png;
    return src ? MEDIA_CDN + '/' + src : null;
  }

  function pickRandom(arr, n){
    var a = arr.slice().filter(pngSrc);
    var out = [];
    while (out.length < n && a.length) {
      var i = Math.floor(Math.random() * a.length);
      out.push(a.splice(i, 1)[0]);
    }
    return out;
  }

  /* groups: [{label, count, records[]}] sorted desc */
  function groupBy(arr, key){
    var m = {};
    arr.forEach(function(r){
      var v = r[key] || '';
      if (!v) return;
      if (!m[v]) m[v] = [];
      m[v].push(r);
    });
    return Object.entries(m)
      .map(function(e){ return { label: e[0], count: e[1].length, records: e[1] }; })
      .sort(function(a,b){ return b.count - a.count; });
  }

  function renderDonut(groups, size, imgSz, maxThumbs, flagMap){
    size = size || 280;
    imgSz = imgSz || 0;
    maxThumbs = maxThumbs || 0;
    var r = size/2, cx = r, cy = r, ir = r*0.52;
    var imgR = (r + ir) / 2;
    var total = groups.reduce(function(s,g){ return s+g.count; }, 0);
    if (!total) return '<svg width="'+size+'" height="'+size+'"></svg><div class="rc-donut-legend"></div>';

    var angle = -Math.PI/2;
    var defs = '', paths = '', imgs = '';
    groups.forEach(function(g, i){
      var slice = (g.count/total)*Math.PI*2;
      var midAngle = angle + slice/2;
      var x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
      angle += slice;
      var x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
      var xi1=cx+ir*Math.cos(angle-slice), yi1=cy+ir*Math.sin(angle-slice);
      var xi2=cx+ir*Math.cos(angle), yi2=cy+ir*Math.sin(angle);
      var large = slice > Math.PI ? 1 : 0;
      var col = DONUT_COLORS[i % DONUT_COLORS.length];
      paths += '<path d="M'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+
               ' L'+xi2+','+yi2+' A'+ir+','+ir+' 0 '+large+',0 '+xi1+','+yi1+' Z"'+
               ' fill="'+col+'" stroke="#0d0d08" stroke-width="1.5"/>';

      if (maxThumbs && i < maxThumbs && imgSz) {
        var ix = cx + imgR * Math.cos(midAngle);
        var iy = cy + imgR * Math.sin(midAngle);
        var half = imgSz/2;
        var clipId = 'rc-clip-'+i;
        var src = '', href = '';

        if (flagMap && flagMap[g.label]) {
          /* flag ŌĆö rectangular clip with rounded corners */
          var fw = Math.round(imgSz*1.5), fh = imgSz;
          defs += '<clipPath id="'+clipId+'"><rect x="'+(ix-fw/2)+'" y="'+(iy-fh/2)+'" width="'+fw+'" height="'+fh+'" rx="3"/></clipPath>';
          src = MEDIA_CDN + '/' + flagMap[g.label];
          imgs += '<image href="'+src+'" x="'+(ix-fw/2)+'" y="'+(iy-fh/2)+'" width="'+fw+'" height="'+fh+'"'+
            ' clip-path="url(#'+clipId+')" preserveAspectRatio="xMidYMid meet"/>';
        } else {
          var pick = pickRandom(g.records, 1)[0];
          if (pick) {
            src = pngSrc(pick);
            href = EXHIBIT + '?id=' + encodeURIComponent(pick.id);
            defs += '<clipPath id="'+clipId+'"><circle cx="'+ix+'" cy="'+iy+'" r="'+half+'"/></clipPath>';
            imgs += '<a href="'+href+'" title="'+esc(pick.title||pick.id)+'" target="_self">'+
              '<image href="'+src+'" x="'+(ix-half)+'" y="'+(iy-half)+'" width="'+imgSz+'" height="'+imgSz+'"'+
              ' clip-path="url(#'+clipId+')" preserveAspectRatio="xMidYMid meet" style="cursor:pointer"/>'+
              '</a>';
          }
        }
      }
    });

    var svg = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
      '<defs>'+defs+'</defs>'+paths+imgs+'</svg>';

    var legend = groups.map(function(g, i){
      var col = DONUT_COLORS[i % DONUT_COLORS.length];
      return '<div class="rc-legend-item">'+
        '<div class="rc-legend-dot" style="background:'+col+'"></div>'+
        '<span>'+esc(g.label)+'</span>'+
        '<span class="rc-legend-cnt">'+g.count+'</span>'+
        '</div>';
    }).join('');

    return svg + '<div class="rc-donut-legend" style="align-self:stretch;justify-content:space-evenly;">' + legend + '</div>';
  }

  function renderBars(groups){
    var maxVal = groups.reduce(function(m,g){ return Math.max(m,g.count); }, 1);
    return groups.map(function(g){
      var pct = Math.round(g.count/maxVal*92);
      var pick = pickRandom(g.records, 1)[0];
      var thumbInner = '';
      if (pick) {
        var src = pngSrc(pick);
        thumbInner = '<a onclick="rcOpenPreview(\''+pick.id+'\')" title="'+esc(g.label+' ŌĆö '+(pick.title||pick.id))+'"'+
          ' style="position:absolute;left:'+pct+'%;top:0;transform:translateX(-50%);z-index:2;display:block;cursor:pointer;'+
          'height:64px;width:96px;'+
          'background-image:url(\''+src+'\');background-size:contain;background-repeat:no-repeat;background-position:center center;'+
          'text-decoration:none;"></a>';
      }
      return '<div class="rc-bar-row">'+
        '<div class="rc-bar-lbl">'+esc(String(g.label))+'</div>'+
        '<div class="rc-bar-track"><div class="rc-bar-fill" style="width:'+pct+'%"></div>'+thumbInner+'</div>'+
        '<div class="rc-bar-cnt">'+g.count+'</div>'+
        '</div>';
    }).join('');
  }

  function renderStats(){
    var data = filtered;

    /* single record: show its glow/preview media above the (all-degenerate) stats */
    var mediaEl = document.getElementById('rc-stats-media');
    var mediaHtml = '';
    if (data.length === 1) {
      var sr = data[0];
      var videoSrc = glowSrc(sr) || previewSrc(sr);
      var imgSrc    = pngSrc(sr);
      mediaHtml = videoSrc
        ? '<video class="rc-single-media" src="'+videoSrc+'" muted autoplay loop playsinline></video>'
        : (imgSrc ? '<img class="rc-single-media" src="'+imgSrc+'">' : '');
      mediaEl.onclick = function(){ rcOpenPreview(sr.id); };
    }
    mediaEl.innerHTML = mediaHtml;
    mediaEl.classList.toggle('show', !!mediaHtml);

    /* KPI */
    var exhibits = data.filter(function(r){ return r.Category === 'ąŁą║čüą┐ąŠąĮą░čéčŗ'; }).length;
    var collages = data.filter(function(r){ return r.Category === 'ąÜąŠą╗ą╗ą░ąČąĖ'; }).length;
    document.getElementById('rc-stats-kpi').innerHTML =
      kpiCard(data.length, 'ąÆčüąĄą│ąŠ ąĘą░ą┐ąĖčüąĄą╣') +
      kpiCard(exhibits, 'ąŁą║čüą┐ąŠąĮą░čéąŠą▓') +
      kpiCard(collages, 'ąÜąŠą╗ą╗ą░ąČąĄą╣');

    var charts = '';

    /* donuts: ąŠą▒čŖąĄą║čé (ą▒ąŠą╗čīčłąŠą╣) + čüčéčĆą░ąĮą░ ąĖ ą╝čāąĘąĄą╣ (ą╝ą░ą╗čŗąĄ) čüą┐čĆą░ą▓ą░ */
    var byObj     = groupBy(data, 'Object');
    var byCountry = groupBy(data, 'Country');
    var byMuseum  = groupBy(data, 'Museum');

    var H3 = 'font-size:14px;letter-spacing:1px;text-transform:uppercase;color:#9a8c70;margin-bottom:14px;font-weight:normal;';
    var flagMap = _buildFlagMap();
    var donutSlots = '';

    donutSlots += dimensionSlot('ą¤ąŠ čéąĖą┐čā ąŠą▒čŖąĄą║čéą░', byObj, 280, 64, 3, null, H3, data.length);
    donutSlots += dimensionSlot('ą¤ąŠ čüčéčĆą░ąĮąĄ ą┐čĆąŠąĖąĘą▓ąŠą┤ąĖčéąĄą╗čÅ', byCountry, 280, 32, 4, flagMap, H3, data.length);
    donutSlots += dimensionSlot('ą¤ąŠ ą╝čāąĘąĄčÄ', byMuseum, 280, 0, 0, null, H3, data.length);

    if (donutSlots) {
      charts += '<div class="stats-chart-card wide"><div style="display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;">'+donutSlots+'</div></div>';
    }

    /* bar: čģčĆąŠąĮąŠą╗ąŠą│ąĖčÅ ą┐ąŠ ą│ąŠą┤čā */
    var yearMap = {};
    data.forEach(function(r){
      var y = r.Year || ''; if (!y) return;
      if (!yearMap[y]) yearMap[y] = [];
      yearMap[y].push(r);
    });
    var yearGroups = Object.entries(yearMap)
      .map(function(e){ return { label: e[0], count: e[1].length, records: e[1] }; })
      .sort(function(a,b){ return b.label - a.label; });
    if (yearGroups.length > 1) {
      charts += chartCard('ąźčĆąŠąĮąŠą╗ąŠą│ąĖčÅ ąŠą▒čŖąĄą║čéąŠą▓', '<div class="rc-bars">'+renderBars(yearGroups)+'</div>', true);
    } else if (yearGroups.length === 1) {
      charts += chartCard('ąźčĆąŠąĮąŠą╗ąŠą│ąĖčÅ ąŠą▒čŖąĄą║čéąŠą▓', degenerateStat(yearGroups[0], data.length), true);
    }

    document.getElementById('rc-stats-charts').innerHTML = charts;
  }

  /* One dimension of the stats view: a donut when there's real spread across
     groups, or a flat stat line when the current filter has left only one
     group (a pie/point chart there would be 100% noise, 0% signal). */
  function dimensionSlot(title, groups, size, imgSz, maxThumbs, flagMap, H3, total){
    if (!groups.length) return '';
    var body = groups.length === 1
      ? '<div class="stats-degenerate">'+degenerateStat(groups[0], total)+'</div>'
      : '<div class="rc-donut-wrap">'+renderDonut(groups, size, imgSz, maxThumbs, flagMap)+'</div>';
    return '<div><h3 style="'+H3+'">'+title+'</h3>'+body+'</div>';
  }

  function degenerateStat(g, total){
    var pct = total ? Math.round(g.count/total*100) : 100;
    return esc(String(g.label))+' <span class="sd-cnt">ŌĆö '+g.count+' ąĖąĘ '+total+' ('+pct+'%)</span>';
  }

  function kpiCard(val, lbl){
    return '<div class="stats-kpi-card"><div class="kpi-val">'+val+'</div><div class="kpi-lbl">'+lbl+'</div></div>';
  }

  function chartCard(title, body, wide){
    return '<div class="stats-chart-card'+(wide?' wide':'')+'"><h3 style="font-size:20px;letter-spacing:1px;text-transform:uppercase;color:#9a8c70;margin-bottom:14px;font-weight:normal;">'+title+'</h3>'+body+'</div>';
  }

  function renderPagination(totalPages){
    var el = document.getElementById('rc-pagination');
    el.innerHTML = '';
    if (totalPages <= 1) return;

    var prev = document.createElement('button');
    prev.className = 'pg-btn'; prev.textContent = 'ŌåÉ'; prev.disabled = currentPage === 1;
    prev.onclick = function(){ currentPage--; renderPage(); scrollTo(0,0); };
    el.appendChild(prev);

    for (var p = 1; p <= totalPages; p++){
      (function(p){
        var btn = document.createElement('button');
        btn.className = 'pg-btn' + (p === currentPage ? ' active' : '');
        btn.textContent = p;
        btn.onclick = function(){ currentPage = p; renderPage(); scrollTo(0,0); };
        el.appendChild(btn);
      })(p);
    }

    var next = document.createElement('button');
    next.className = 'pg-btn'; next.textContent = 'ŌåÆ'; next.disabled = currentPage === totalPages;
    next.onclick = function(){ currentPage++; renderPage(); scrollTo(0,0); };
    el.appendChild(next);
  }

  function glowSrc(r){
    var src = r.zones && r.zones.exhibit_video && r.zones.exhibit_video.source;
    return src ? MEDIA_CDN + '/' + src : null;
  }

  var _MUSEUM_SLUGS = {};

  function _loadMuseumSlugs() {
    return fetch(APP_CDN + '/museums.json?_=' + Date.now())
      .then(function(r){ return r.ok ? r.json() : []; })
      .then(function(list){
        list.forEach(function(m){ if (m.name && m.id) _MUSEUM_SLUGS[m.name] = m.id; });
      })
      .catch(function(){});
  }

  function previewSrc(r, suffix) {
    var slug = _MUSEUM_SLUGS[r.Museum] || '';
    var sfx  = suffix || '';
    if (slug) return MEDIA_CDN + '/exhibits/' + slug + '/previews/' + r.id + sfx + '_pr.webm';
    return MEDIA_CDN + '/previews/' + r.id + sfx + '_pr.webm'; // legacy fallback
  }

  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
}());
//]]>
</script>
