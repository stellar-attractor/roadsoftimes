<style>
.rot-cat *, .rot-cat *::before, .rot-cat *::after { box-sizing: border-box; margin: 0; padding: 0; }
.rot-cat { font-family: 'PT Sans', sans-serif; color: #c8c0a8; }

/* FILTERS */
.rot-cat .filters { padding: 20px 0; border-bottom: 1px solid #1a1a0e; display: flex; flex-direction: column; gap: 10px; }
.rot-cat .filter-row { display: flex; flex-wrap: wrap; gap: 12px; }
.rot-cat .filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
.rot-cat .filter-group label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #9a8c70; }
.rot-cat .filter-group input,
.rot-cat .filter-group select {
  background: #12120c; border: 1px solid #2a2510; color: #c8c0a8;
  font-family: 'PT Sans', sans-serif; font-size: 13px; padding: 7px 10px;
  border-radius: 3px; outline: none; transition: border-color 0.15s;
}
.rot-cat .filter-group input:focus,
.rot-cat .filter-group select:focus { border-color: #c9a84c; }
.rot-cat .filter-group select option { background: #12120c; }

/* FLAG SELECT */
.rc-flag-sel { position: relative; }
.rc-flag-trigger {
  background: #12120c; border: 1px solid #2a2510; color: #c8c0a8;
  font-family: 'PT Sans', sans-serif; font-size: 13px; padding: 7px 10px;
  border-radius: 3px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: border-color .15s; user-select: none; white-space: nowrap;
}
.rc-flag-trigger:hover, .rc-flag-sel.open .rc-flag-trigger { border-color: #c9a84c; }
.rc-flag-trigger img { width: 20px; height: 14px; object-fit: cover; border: 1px solid #3a3520; flex-shrink: 0; }
.rc-flag-trigger::after { content: '\25BE'; margin-left: auto; padding-left: 8px; color: #6a5f40; font-size: 11px; }
.rc-flag-drop {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; z-index: 200;
  background: #12120c; border: 1px solid #2a2510; border-radius: 3px;
  width: 160px; max-height: 260px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,.7);
}
.rc-flag-sel.open .rc-flag-drop { display: block; }
.rc-flag-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 2px 10px; margin: 0; cursor: pointer;
  font-size: 12px; color: #c8c0a8; transition: background .12s;
  white-space: nowrap; line-height: 1;
}
.rc-flag-opt:hover { background: #1e1d14; }
.rc-flag-opt.selected { color: #c9a84c; background: #161610; }
.rc-flag-opt img { width: 20px; height: 14px; object-fit: cover; border: 1px solid #3a3520; flex-shrink: 0; }
#rc-museum-list .rc-flag-opt,
#rc-country-list .rc-flag-opt,
#rc-category-list .rc-flag-opt {
  margin: 0 !important; padding: 2px 10px !important;
  line-height: 1 !important; font-size: 12px !important;
  margin-bottom: 0 !important; margin-top: 0 !important;
}

/* DATE FILTER */
.rot-cat .date-filter { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 10px; }
.rot-cat .date-filter .filter-group { flex: 0 0 auto; min-width: 0; }
.rot-cat .date-extra { display: none; align-items: flex-end; gap: 8px; flex-wrap: wrap; }
.rot-cat .date-extra.show { display: flex; }
.rot-cat .date-extra label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #9a8c70; display: block; margin-bottom: 4px; }
.rot-cat .date-extra input[type="number"] { width: 80px; }
.rot-cat .date-extra input[type="date"] { width: 140px; }
.rot-cat .date-extra span { color: #9a8c70; font-size: 12px; padding-bottom: 9px; }

/* TOOLBAR */
.rot-cat .toolbar {
  padding: 10px 0; font-size: 11px; color: #9a8c70; letter-spacing: 1px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px; border-bottom: 1px solid #1a1a0e;
}
.rot-cat .toolbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rot-cat .toolbar-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #9a8c70; }
.rot-cat .view-toggle { display: flex; gap: 6px; }
.rot-cat .view-btn {
  background: none; border: 1px solid #2a2510; color: #9a8c70; cursor: pointer;
  padding: 4px 10px; border-radius: 3px; font-size: 13px; line-height: 1.4;
  transition: color .15s, border-color .15s; font-family: 'PT Sans', sans-serif;
}
.rot-cat .view-btn.active, .rot-cat .view-btn:hover { color: #c9a84c; border-color: #8a6f2e; }
.rot-cat .toolbar select {
  background: #12120c; border: 1px solid #2a2510; color: #c8c0a8;
  font-family: 'PT Sans', sans-serif; font-size: 12px; padding: 4px 8px;
  border-radius: 3px; outline: none;
}

/* GRID VIEW */
.rot-cat .container.view-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: #1a1a0e;
}
.rot-cat .container.view-grid .card {
  background: #0d0d08; cursor: pointer; transition: background 0.15s;
  text-decoration: none; color: inherit; display: flex; flex-direction: column;
}
.rot-cat .container.view-grid .card:hover { background: #131309; }
.rot-cat .container.view-grid .card-thumb {
  height: 200px; background: #080806; overflow: hidden;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.rot-cat .container.view-grid .card-thumb video,
.rot-cat .container.view-grid .card-thumb img { width: 90%; height: 90%; object-fit: contain; display: block; }
.rot-cat .container.view-grid .card-body { padding: 14px 16px; flex: 1; }
.rot-cat .container.view-grid .card-title { font-size: 13px; font-weight: 700; color: #e0d8c0; margin-bottom: 6px; line-height: 1.3; }
.rot-cat .container.view-grid .card-meta { font-size: 11px; color: #a09880; line-height: 1.6; }
.rot-cat .container.view-grid .card-meta span { color: #7ab0b0; }
.rot-cat .container.view-grid .card-tags { padding: 8px 16px 14px; display: flex; gap: 6px; flex-wrap: wrap; }

/* LIST VIEW */
.rot-cat .container.view-list { display: flex; flex-direction: column; }
.rot-cat .container.view-list .card {
  display: flex; flex-direction: row; align-items: stretch;
  text-decoration: none; color: inherit; border-bottom: 1px solid #1a1a0e;
  padding: 14px 0; gap: 16px; transition: background .15s; cursor: pointer;
}
.rot-cat .container.view-list .card:hover { background: #0d0d08; }
.rot-cat .container.view-list .card-thumb {
  width: 130px; min-width: 130px; height: 86px; background: #080806;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border-radius: 2px;
}
.rot-cat .container.view-list .card-thumb video,
.rot-cat .container.view-list .card-thumb img { width: 90%; height: 90%; object-fit: contain; display: block; }
.rot-cat .container.view-list .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
.rot-cat .container.view-list .card-title { font-size: 15px; font-weight: 700; color: #e0d8c0; line-height: 1.3; }
.rot-cat .container.view-list .card-meta { font-size: 12px; color: #a09880; line-height: 1.5; }
.rot-cat .container.view-list .card-meta span { color: #7ab0b0; }
.rot-cat .container.view-list .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

.rot-cat .no-media { font-family: 'Orbitron', sans-serif; font-size: 9px; color: #2a2510; letter-spacing: 2px; }
.rot-cat .tag { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border: 1px solid #2a2510; color: #a09880; border-radius: 2px; }
.rot-cat .empty { padding: 60px; text-align: center; color: #3a3020; font-size: 13px; letter-spacing: 1px; }

/* TABLE VIEW */
.rot-cat .container.view-table { width: 100%; }
.rot-cat .rc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.rot-cat .rc-table th {
  text-align: left; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: #9a8c70; padding: 8px 12px; border-bottom: 1px solid #2a2510;
  background: #0d0d08; font-weight: normal; white-space: nowrap;
}
.rot-cat .rc-table td { padding: 9px 12px; border-bottom: 1px solid #161610; color: #c8c0a8; vertical-align: middle; }
.rot-cat .rc-table tr.rc-row { cursor: pointer; transition: background .12s; }
.rot-cat .rc-table tr.rc-row:hover { background: #131309; }
.rot-cat .rc-table tr.rc-row.rc-selected { background: #1a1a0a; border-left: 2px solid #c9a84c; }
.rot-cat .rc-table td.rc-title { font-weight: 700; color: #e0d8c0; }
.rot-cat .rc-table td.rc-museum { color: #7ab0b0; }
.rot-cat .rc-table td.rc-city,
.rot-cat .rc-table td.rc-country { min-width: 110px; }
.rot-cat .rc-table td.rc-date { color: #9a8c70; font-size: 11px; white-space: nowrap; }

/* DETAIL PANEL */
.rot-cat .rc-detail {
  background: #0d0d08; border-top: 2px solid #2a2510;
  display: none; padding: 20px 24px; gap: 20px;
}
.rot-cat .rc-detail.open { display: flex; flex-wrap: wrap; align-items: flex-start; }
.rot-cat .rc-detail-thumb {
  width: 160px; min-width: 160px; height: 104px; background: #080806;
  display: flex; align-items: center; justify-content: center; border-radius: 2px; flex-shrink: 0;
}
.rot-cat .rc-detail-thumb video,
.rot-cat .rc-detail-thumb img { width: 90%; height: 90%; object-fit: contain; display: block; }
.rot-cat .rc-detail-fields { flex: 1; display: grid; grid-template-columns: auto 1fr; gap: 5px 16px; align-content: start; }
.rot-cat .rc-detail-fields dt { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #9a8c70; white-space: nowrap; padding-top: 1px; }
.rot-cat .rc-detail-fields dd { font-size: 13px; color: #c8c0a8; }
.rot-cat .rc-detail-link { align-self: center; margin-left: auto; padding-left: 20px; flex-shrink: 0; }
.rot-cat .rc-detail-link a {
  display: inline-block; padding: 8px 18px; border: 1px solid #8a6f2e;
  color: #c9a84c; text-decoration: none; font-size: 12px; border-radius: 3px;
  letter-spacing: 1px; transition: background .15s;
}
.rot-cat .rc-detail-link a:hover { background: #1a1a0a; }

/* PAGINATION */
.rot-cat .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 24px 0; }
.rot-cat .pg-btn {
  background: none; border: 1px solid #2a2510; color: #a09880; cursor: pointer;
  padding: 5px 12px; border-radius: 3px; font-family: 'PT Sans', sans-serif;
  font-size: 13px; transition: color .15s, border-color .15s;
}
.rot-cat .pg-btn:hover { color: #c9a84c; border-color: #8a6f2e; }
.rot-cat .pg-btn.active { color: #c9a84c; border-color: #8a6f2e; background: #12120c; }
.rot-cat .pg-btn:disabled { opacity: 0.25; cursor: default; }

/* STATS VIEW */
.rot-cat .rc-stats { padding: 24px 0; display: none; flex-direction: column; gap: 28px; }
.rot-cat .rc-stats.show { display: flex; }
.rot-cat .stats-kpi { display: flex; gap: 16px; flex-wrap: wrap; }
.rot-cat .stats-kpi-card {
  background: #0d0d08; border: 1px solid #2a2510; border-radius: 4px;
  padding: 16px 24px; min-width: 140px;
}
.rot-cat .stats-kpi-card .kpi-val { font-size: 32px; font-weight: 700; color: #c9a84c; line-height: 1; }
.rot-cat .stats-kpi-card .kpi-lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #9a8c70; margin-top: 6px; }
.rot-cat .stats-charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.rot-cat .stats-chart-card {
  background: #0d0d08; border: 1px solid #2a2510; border-radius: 4px; padding: 16px 20px;
}
.rot-cat .stats-chart-card h3 { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #9a8c70; margin-bottom: 14px; font-weight: normal; }
.rot-cat .stats-chart-card.wide { grid-column: 1 / -1; }
/* donut */
.rc-donut-wrap { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.rc-donut-wrap svg { flex-shrink: 0; }
.rc-donut-legend { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; max-height: 200px; overflow-y: auto; }
.rc-donut-legend::-webkit-scrollbar { width: 4px; }
.rc-donut-legend::-webkit-scrollbar-track { background: #12120c; }
.rc-donut-legend::-webkit-scrollbar-thumb { background: #2a2510; }
.rc-legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #c8c0a8; white-space: nowrap; }
.rc-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.rc-legend-cnt { margin-left: auto; color: #9a8c70; padding-left: 8px; }
/* bar chart */
.rc-bars { display: flex; flex-direction: column; gap: 3px; }
.rc-bar-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #c8c0a8; height: 68px; }
.rc-bar-lbl { width: 80px; text-align: right; color: #9a8c70; flex-shrink: 0; font-size: 26px; white-space: nowrap; }
.rc-bar-track { flex: 1; height: 64px; background: #12120c; border-radius: 4px; overflow: visible; position: relative; max-width: calc(100% - 120px); }
.rc-bar-fill { height: 100%; background: #c9a84c; border-radius: 2px; transition: width .3s; }
.rc-bar-cnt { flex-shrink: 0; color: #c9a84c; font-size: 48px; font-weight: 700; line-height: 1; padding-left: 6px; }
.rc-bar-thumb { height: 64px; width: auto; object-fit: contain; flex-shrink: 0; opacity: 0.85; display: block; border: none; outline: none; }
.rot-cat .rc-bar-track img { height: 64px !important; width: auto !important; display: block !important; vertical-align: top !important; max-width: none !important; border: none !important; }
.rot-cat .rc-bar-track a { text-decoration: none !important; border: none !important; border-bottom: none !important; outline: none !important; box-shadow: none !important; }
/* donut thumbs */
.rc-donut-thumbs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.rc-donut-thumb { height: 40px; width: auto; object-fit: contain; border-radius: 2px; opacity: 0.85; cursor: pointer; transition: opacity .15s; }
.rc-donut-thumb:hover { opacity: 1; }
</style>

<div class="rot-cat">
  <div class="filters">
    <!-- комбобоксы -->
    <div class="filter-row">
      <div class="filter-group"><label>Музей</label>
        <div class="rc-flag-sel" id="rc-museum-wrap">
          <div class="rc-flag-trigger" id="rc-museum-trigger">Все музеи</div>
          <div class="rc-flag-drop" id="rc-museum-list"><div class="rc-flag-opt selected" data-value="">Все музеи</div></div>
        </div>
      </div>
      <div class="filter-group"><label>Страна</label>
        <div style="display:flex;align-items:center;gap:6px">
          <div id="rc-country-flag" style="display:none;width:22px;height:15px;background-size:cover;background-position:center;border:1px solid #3a3520;flex-shrink:0;border-radius:1px"></div>
          <div class="rc-flag-sel" id="rc-country-wrap" style="flex:1">
            <div class="rc-flag-trigger" id="rc-country-trigger">Все страны</div>

      <div class="filter-group"><label>Категория</label>
        <div class="rc-flag-sel" id="rc-category-wrap">
          <div class="rc-flag-trigger" id="rc-category-trigger">Все</div>
          <div class="rc-flag-drop" id="rc-category-list"><div class="rc-flag-opt selected" data-value="">Все</div></div>
        </div>
      </div>
    </div>
    <!-- текстовые поля -->
    <div class="filter-row">
      <div class="filter-group"><label>Название</label><input type="text" id="rc-title" placeholder="поиск…"></div>
      <div class="filter-group"><label>Объект</label><input type="text" id="rc-object-q" placeholder="поиск…"></div>
      <div class="filter-group"><label>ТТХ текст</label><input type="text" id="rc-ttx" placeholder="поиск…"></div>
      <div class="filter-group"><label>Описание</label><input type="text" id="rc-desc" placeholder="поиск…"></div>

      <div class="filter-group date-filter">
        <label>Период</label>
        <select id="rc-date-mode">
          <option value="">Все периоды</option>

          <option value="range">Диапазон дат</option>
        </select>
      </div>
      <div class="date-extra" id="rc-date-extra-year">
        <div><label>Год</label><input type="number" id="rc-year-val" placeholder="2026" min="2000" max="2099"></div>
      </div>
      <div class="date-extra" id="rc-date-extra-range">
        <div><label>С</label><input type="date" id="rc-date-from"></div>
        <span>—</span>
        <div><label>По</label><input type="date" id="rc-date-to"></div>
      </div>
    </div>
  </div>
  <div class="toolbar">
    <span id="rc-count">Загрузка…</span>
    <div class="toolbar-right">
      <label class="toolbar-label">Сортировка</label>

        <option value="asc">С начала</option>

    <div class="stats-kpi" id="rc-stats-kpi"></div>
    <div class="stats-charts" id="rc-stats-charts"></div>
  </div>
</div>

<script>
//<![CDATA[
(function(){
  var CDN      = 'https://roadsoftimes.pages.dev';
  var EXHIBIT  = 'https://roadsoftimes.blogspot.com/p/exhibit.html';
  var DB       = CDN + '/infographics.json';
  var PER_PAGE = 12;
  var all = [], filtered = [], currentPage = 1;
  var currentView = 'grid';
  var colSort = { key: null, dir: 1 };
  try { currentView = localStorage.getItem('rot-catalog-view') || 'grid'; } catch(e){}

  _loadMuseumSlugs();

  fetch(DB).then(function(r){ return r.json(); }).then(function(data){
    all = data.map(function(r,i){ return Object.assign({_idx:i}, r); });
    populateFilters();
    applyView(currentView);
    render();
  });

  window.rcSetView = function(v){
    currentView = v;
    try { localStorage.setItem('rot-catalog-view', v); } catch(e){}
    applyView(v); renderPage();
  };

  function applyView(v){
    var isStats = v === 'stats';
    document.getElementById('rc-container').className = 'container view-' + (isStats ? 'grid' : v);
    document.getElementById('rc-container').style.display = isStats ? 'none' : '';
    document.getElementById('rc-pagination').style.display = isStats ? 'none' : '';
    document.getElementById('rc-detail').className = 'rc-detail';
    document.getElementById('rc-stats').classList.toggle('show', isStats);
    document.getElementById('rc-btn-grid').classList.toggle('active', v === 'grid');
    document.getElementById('rc-btn-list').classList.toggle('active', v === 'list');
    document.getElementById('rc-btn-table').classList.toggle('active', v === 'table');
    document.getElementById('rc-btn-stats').classList.toggle('active', isStats);
  }

  function uniq(arr){ return Array.from(new Set(arr.filter(Boolean))).sort(); }

  /* ── custom dropdown factory ── */
  var _FLAG_FALLBACK = { 'Польша': 'flags/pl.svg' };

  function _buildFlagMap(){
    var m = Object.assign({}, _FLAG_FALLBACK);
    all.forEach(function(r){
      if (r.Country && !m[r.Country] && r.zones && r.zones.image_flag)
        m[r.Country] = r.zones.image_flag.source || '';
    });
    return m;
  }

  /* Returns {get, set(val)} */
  function _makeDropdown(wrapId, placeholder, vals, flagMap, flagImgId){
    var wrap    = document.getElementById(wrapId);
    var trigger = wrap.querySelector('.rc-flag-trigger');
    var list    = wrap.querySelector('.rc-flag-drop');
    var flagImg = flagImgId ? document.getElementById(flagImgId) : null;
    var current = '';

    function _set(val, label, src){
      current = val;
      trigger.textContent = label || placeholder;
      if (flagImg) {
        if (val && src) {
          flagImg.style.backgroundImage = 'url(' + CDN + '/' + src + ')';
          flagImg.style.display = 'block';
        } else {
          flagImg.style.display = 'none';
        }
      }
      list.querySelectorAll('.rc-flag-opt').forEach(function(li){
        li.classList.toggle('selected', li.dataset.value === val);
      });
      wrap.classList.remove('open');
      render();
    }

    list.querySelector('[data-value=""]').addEventListener('click', function(){ _set('', placeholder, ''); });

    var OPT_STYLE = 'display:flex;align-items:center;gap:8px;padding:2px 10px;margin:0;line-height:1;font-size:12px;cursor:pointer;white-space:nowrap;color:#c8c0a8;';
    vals.forEach(function(v){
      var li  = document.createElement('div');
      li.className    = 'rc-flag-opt';
      li.dataset.value = v;
      li.style.cssText = OPT_STYLE;
      var src = flagMap && flagMap[v] || '';
      li.textContent = v;
      li.addEventListener('click', function(){ _set(v, v, src); });
      list.appendChild(li);
    });

    trigger.addEventListener('click', function(e){
      e.stopPropagation();
      document.querySelectorAll('.rc-flag-sel.open').forEach(function(w){ if (w !== wrap) w.classList.remove('open'); });
      wrap.classList.toggle('open');
    });

    return { get: function(){ return current; }, set: _set };
  }

  var _museumSel, _countrySel, _categorySel;

  function _injectDropdownStyles(){
    var s = document.createElement('style');
    s.textContent =
      '#rc-museum-list > *, #rc-country-list > *, #rc-category-list > * {' +
      'margin:0!important;margin-top:0!important;margin-bottom:0!important;' +
      'padding:2px 10px!important;line-height:1!important;font-size:12px!important;' +
      'display:flex!important;align-items:center;gap:8px;cursor:pointer;' +
      'white-space:nowrap;color:#c8c0a8;box-sizing:border-box!important;}';
    document.head.appendChild(s);
  }

  function populateFilters(){
    _injectDropdownStyles();
    var flagMap = _buildFlagMap();

    _museumSel   = _makeDropdown('rc-museum-wrap',   'Все музеи',  uniq(all.map(function(r){ return r.Museum; })),   null);
    _countrySel  = _makeDropdown('rc-country-wrap',  'Все страны', uniq(all.map(function(r){ return r.Country; })),  flagMap, 'rc-country-flag');
    _categorySel = _makeDropdown('rc-category-wrap', 'Все',        uniq(all.map(function(r){ return r.Category; })), null);

    document.addEventListener('click', function(){ document.querySelectorAll('.rc-flag-sel.open').forEach(function(w){ w.classList.remove('open'); }); });

    // pre-select museum from URL param ?museum=
    var urlMuseum = new URLSearchParams(location.search).get('museum');
    if (urlMuseum) _museumSel.set(urlMuseum, urlMuseum, '');

    var ids = ['rc-title','rc-object-q','rc-ttx','rc-desc','rc-sort',
               'rc-date-mode','rc-year-val','rc-date-from','rc-date-to'];
    ids.forEach(function(id){ document.getElementById(id).addEventListener('input', render); });

    document.getElementById('rc-date-mode').addEventListener('change', function(){
      var mode = this.value;
      document.getElementById('rc-date-extra-year').classList.toggle('show', mode === 'year');
      document.getElementById('rc-date-extra-range').classList.toggle('show', mode === 'range');
      render();
    });
  }

  function gval(id){ return (document.getElementById(id).value || '').trim().toLowerCase(); }
  function sval(id){ return (document.getElementById(id).value || '').trim(); }

  function textOf(r){
    var ttx = (r.ttx_text || '') + ' ' + (r.zones && r.zones.ttx_text ? r.zones.ttx_text.text || '' : '');
    var sub = (r.subtitle || '') + ' ' + (r.zones && r.zones.subtitle ? r.zones.subtitle.text || '' : '');
    return { ttx: ttx.toLowerCase(), desc: sub.toLowerCase() };
  }

  function render(){
    var q    = gval('rc-title');
    var qobj = gval('rc-object-q');
    var qttx = gval('rc-ttx');
    var qdesc= gval('rc-desc');
    var country  = _countrySel  ? _countrySel.get()  : '';
    var cat      = _categorySel ? _categorySel.get() : '';
    var sort     = document.getElementById('rc-sort').value;
    var dateMode = document.getElementById('rc-date-mode').value;
    var nowYear  = new Date().getFullYear();
    var yearVal  = parseInt(sval('rc-year-val'), 10) || 0;
    var dateFrom = sval('rc-date-from');
    var dateTo   = sval('rc-date-to');

    filtered = all.filter(function(r){
      if (q    && !(r.title||'').toLowerCase().includes(q) && !(r.id||'').toLowerCase().includes(q)) return false;
      if (qobj && !(r.Object||'').toLowerCase().includes(qobj)) return false;
      var tx = qttx || qdesc ? textOf(r) : null;
      if (qttx && !tx.ttx.includes(qttx)) return false;
      if (qdesc && !tx.desc.includes(qdesc)) return false;
      var museum = _museumSel ? _museumSel.get() : '';
      if (museum  && (r.Museum||'')   !== museum)  return false;
      if (country && (r.Country||'')  !== country) return false;
      if (cat     && (r.Category||'') !== cat)     return false;

      var d = r.date || '';
      if (dateMode === 'this-year' && !d.startsWith(String(nowYear))) return false;
      if (dateMode === 'last-year' && !d.startsWith(String(nowYear - 1))) return false;
      if (dateMode === 'year' && yearVal && !d.startsWith(String(yearVal))) return false;
      if (dateMode === 'range'){
        if (dateFrom && d < dateFrom) return false;
        if (dateTo   && d > dateTo)   return false;
      }
      return true;
    }).sort(function(a, b){
      var da = a.date || '', db = b.date || '';
      if (da || db) return sort === 'asc' ? da.localeCompare(db) : db.localeCompare(da);
      return sort === 'asc' ? a._idx - b._idx : b._idx - a._idx;
    });

    currentPage = 1;
    renderPage();
  }

  function renderPage(){
    var totalPages = Math.ceil(filtered.length / PER_PAGE);
    var page = filtered.slice((currentPage-1)*PER_PAGE, currentPage*PER_PAGE);

    document.getElementById('rc-count').textContent =
      'Найдено: ' + filtered.length + ' из ' + all.length +
      (totalPages > 1 ? '  ·  стр. ' + currentPage + ' / ' + totalPages : '');

    var c = document.getElementById('rc-container');
    c.innerHTML = '';

    if (!filtered.length){
      c.innerHTML = '<div class="empty">Ничего не найдено</div>';
      document.getElementById('rc-pagination').innerHTML = '';
      return;
    }

    if (currentView === 'stats') { renderStats(); return; }
    if (currentView === 'table') { renderTable(page, totalPages); return; }

    page.forEach(function(r){
      var thumbSrc = currentView === 'list'
        ? (glowSrc(r) || previewSrc(r))
        : previewSrc(r);
      var exhibitUrl = EXHIBIT + '?id=' + encodeURIComponent(r.id);

      var a = document.createElement('a');
      a.className = 'card';
      a.href = exhibitUrl;

      var thumb = document.createElement('div');
      thumb.className = 'card-thumb';
      var v = document.createElement('video');
      v.src = thumbSrc; v.muted = true; v.autoplay = true; v.loop = true; v.setAttribute('playsinline','');
      (function(vid, rec){
        vid.onerror = function(){
          var fallback = glowSrc(rec);
          if (fallback && vid.src !== fallback) { vid.src = fallback; }
        };
      }(v, r));
      thumb.appendChild(v);

      var body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML =
        '<div class="card-title">' + esc(r.title || r.id) + '</div>' +
        '<div class="card-meta">' +
          (r.Museum ? '<span>' + esc(r.Museum) + '</span>' + (r.City ? ', ' : '') : '') +
          [r.City, r.Country].filter(Boolean).map(esc).join(', ') +
        '</div>';

      var tags = document.createElement('div');
      tags.className = 'card-tags';
      [r.Object, r.Category].filter(Boolean).forEach(function(t){
        tags.innerHTML += '<span class="tag">' + esc(t) + '</span>';
      });
      body.appendChild(tags);
      a.appendChild(thumb);
      a.appendChild(body);
      c.appendChild(a);
    });

    renderPagination(totalPages);
  }

  var COL_KEYS = [
    { label: 'Название', key: 'title' },
    { label: 'Объект',   key: 'Object' },
    { label: 'Музей',    key: 'Museum' },
    { label: 'Город',    key: 'City' },
    { label: 'Страна',   key: 'Country' },
    { label: 'Дата',     key: 'date' }
  ];

  function renderTable(page, totalPages){
    var c = document.getElementById('rc-container');
    c.innerHTML = '';
    if (!page.length){ c.innerHTML = '<div class="empty">Ничего не найдено</div>'; renderPagination(0); return; }

    var table = document.createElement('table');
    table.className = 'rc-table';
    var thead = document.createElement('thead');
    var htr = document.createElement('tr');
    COL_KEYS.forEach(function(col){
      var th = document.createElement('th');
      var arrow = colSort.key === col.key ? (colSort.dir === 1 ? ' ▲' : ' ▼') : '';
      th.textContent = col.label + arrow;
      th.style.cursor = 'pointer';
      th.onclick = function(){
        if (colSort.key === col.key) { colSort.dir *= -1; }
        else { colSort.key = col.key; colSort.dir = 1; }
        sortFiltered();
        currentPage = 1;
        renderPage();
      };
      htr.appendChild(th);
    });
    thead.appendChild(htr);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    page.forEach(function(r){
      var tr = document.createElement('tr');
      tr.className = 'rc-row';
      tr.innerHTML =
        '<td class="rc-title">'  + esc(r.title || r.id) + '</td>' +
        '<td>'                   + esc(r.Object || '') + '</td>' +
        '<td class="rc-museum">' + esc(r.Museum || '') + '</td>' +
        '<td class="rc-city">'   + esc(r.City || '') + '</td>' +
        '<td class="rc-country">'+ esc(r.Country || '') + '</td>' +
        '<td class="rc-date">'   + esc(r.date || '') + '</td>';
      tr.onclick = function(){ selectRow(r, tr); };
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    c.appendChild(table);
    renderPagination(totalPages);
  }

  function sortFiltered(){
    if (!colSort.key) return;
    var k = colSort.key, d = colSort.dir;
    filtered.sort(function(a, b){
      var va = (a[k] || '').toLowerCase(), vb = (b[k] || '').toLowerCase();
      return va < vb ? -d : va > vb ? d : 0;
    });
  }

  var selectedId = null;
  function selectRow(r, tr){
    if (selectedId === r.id){
      selectedId = null;
      document.querySelectorAll('.rc-row').forEach(function(el){ el.classList.remove('rc-selected'); });
      document.getElementById('rc-detail').className = 'rc-detail';
      return;
    }
    selectedId = r.id;
    document.querySelectorAll('.rc-row').forEach(function(el){ el.classList.remove('rc-selected'); });
    tr.classList.add('rc-selected');

    var detailSrc = glowSrc(r) || previewSrc(r);

    var thumbHtml = '<a href="' + EXHIBIT + '?id=' + encodeURIComponent(r.id) + '" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%">' +
      '<video src="' + detailSrc + '" muted autoplay loop playsinline style="width:90%;height:90%;object-fit:contain;display:block"></video>' +
      '</a>';

    var fields = [
      ['ID', r.id], ['Название', r.title], ['Объект', r.Object],
      ['Музей', r.Museum], ['Город', r.City], ['Страна', r.Country],
      ['Категория', r.Category], ['Дата', r.date], ['Год', r.Year]
    ].filter(function(f){ return f[1]; });

    var fieldsHtml = fields.map(function(f){
      return '<dt>' + esc(f[0]) + '</dt><dd>' + esc(String(f[1])) + '</dd>';
    }).join('');

    var det = document.getElementById('rc-detail');
    det.innerHTML =
      '<div class="rc-detail-thumb">' + thumbHtml + '</div>' +
      '<dl class="rc-detail-fields">' + fieldsHtml + '</dl>' +
      '<div class="rc-detail-link"><a href="' + EXHIBIT + '?id=' + encodeURIComponent(r.id) + '">Открыть →</a></div>';
    det.className = 'rc-detail open';
    det.scrollIntoView({behavior: 'smooth', block: 'nearest'});
  }

  /* ── STATS ── */
  var DONUT_COLORS = [
    '#c9a84c','#7ab0b0','#b07a7a','#7ab07a','#b07ab0',
    '#7a9ab0','#b0967a','#8ab07a','#b07a96','#7ab0a0',
    '#a0b07a','#b08a7a','#7a8ab0','#b0a07a','#7ab0b8'
  ];

  function pngSrc(r){
    var src = r.zones && r.zones.exhibit_video && r.zones.exhibit_video.source_png;
    return src ? CDN + '/' + src : null;
  }

  function pickRandom(arr, n){
    var a = arr.slice().filter(pngSrc);
    var out = [];
    while (out.length < n && a.length) {
      var i = Math.floor(Math.random() * a.length);
      out.push(a.splice(i, 1)[0]);
    }
    return out;
  }

  /* groups: [{label, count, records[]}] sorted desc */
  function groupBy(arr, key){
    var m = {};
    arr.forEach(function(r){
      var v = r[key] || '';
      if (!v) return;
      if (!m[v]) m[v] = [];
      m[v].push(r);
    });
    return Object.entries(m)
      .map(function(e){ return { label: e[0], count: e[1].length, records: e[1] }; })
      .sort(function(a,b){ return b.count - a.count; });
  }

  function renderDonut(groups, size, withSectorThumb, thumbScale, maxThumbs){
    size = size || 160;
    thumbScale = thumbScale || 1;
    maxThumbs = maxThumbs || 3;
    var r = size/2, cx = r, cy = r, ir = r*0.52;
    var imgR = (r + ir) / 2; /* center of ring */
    var imgSz = Math.round(ir * 0.72 * thumbScale); /* fits inside ring thickness */
    var total = groups.reduce(function(s,g){ return s+g.count; }, 0);
    if (!total) return '<svg width="'+size+'" height="'+size+'"></svg><div class="rc-donut-legend"></div>';

    var angle = -Math.PI/2;
    var defs = '', paths = '', imgs = '';
    groups.forEach(function(g, i){
      var slice = (g.count/total)*Math.PI*2;
      var midAngle = angle + slice/2;
      var x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
      angle += slice;
      var x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
      var xi1=cx+ir*Math.cos(angle-slice), yi1=cy+ir*Math.sin(angle-slice);
      var xi2=cx+ir*Math.cos(angle), yi2=cy+ir*Math.sin(angle);
      var large = slice > Math.PI ? 1 : 0;
      var col = DONUT_COLORS[i % DONUT_COLORS.length];
      paths += '<path d="M'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+
               ' L'+xi2+','+yi2+' A'+ir+','+ir+' 0 '+large+',0 '+xi1+','+yi1+' Z"'+
               ' fill="'+col+'" stroke="#0d0d08" stroke-width="1.5"/>';

      /* image on sector — top N largest slices */
      if (withSectorThumb && i < maxThumbs) {
        var pick = pickRandom(g.records, 1)[0];
        if (pick) {
          var src = pngSrc(pick);
          var ix = cx + imgR * Math.cos(midAngle);
          var iy = cy + imgR * Math.sin(midAngle);
          var half = imgSz/2;
          var clipId = 'rc-clip-'+i;
          defs += '<clipPath id="'+clipId+'"><circle cx="'+ix+'" cy="'+iy+'" r="'+half+'"/></clipPath>';
          var href = EXHIBIT + '?id=' + encodeURIComponent(pick.id);
          imgs += '<a href="'+href+'" title="'+esc(pick.title||pick.id)+'" target="_self">'+
            '<image href="'+src+'" x="'+(ix-half)+'" y="'+(iy-half)+'" width="'+imgSz+'" height="'+imgSz+'"'+
            ' clip-path="url(#'+clipId+')" preserveAspectRatio="xMidYMid meet" style="cursor:pointer"/>'+
            '</a>';
        }
      }
    });

    var svg = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+
      '<defs>'+defs+'</defs>'+paths+imgs+'</svg>';

    var legend = groups.map(function(g, i){
      var col = DONUT_COLORS[i % DONUT_COLORS.length];
      return '<div class="rc-legend-item">'+
        '<div class="rc-legend-dot" style="background:'+col+'"></div>'+
        '<span>'+esc(g.label)+'</span>'+
        '<span class="rc-legend-cnt">'+g.count+'</span>'+
        '</div>';
    }).join('');

    return svg + '<div class="rc-donut-legend">' + legend + '</div>';
  }

  function renderBars(groups){
    var maxVal = groups.reduce(function(m,g){ return Math.max(m,g.count); }, 1);
    return groups.map(function(g){
      var pct = Math.round(g.count/maxVal*92);
      var pick = pickRandom(g.records, 1)[0];
      var thumbInner = '';
      if (pick) {
        var src = pngSrc(pick);
        var href = EXHIBIT + '?id=' + encodeURIComponent(pick.id);
        thumbInner = '<a href="'+href+'" title="'+esc(g.label+': '+(pick.title||pick.id))+'"'+
          ' style="position:absolute;left:'+pct+'%;top:0;transform:translateX(-50%);z-index:2;display:block;'+
          'height:64px;width:96px;'+
          'background-image:url(\''+src+'\');background-size:contain;background-repeat:no-repeat;background-position:center center;'+
          'text-decoration:none;"></a>';
      }
      return '<div class="rc-bar-row">'+
        '<div class="rc-bar-lbl">'+esc(String(g.label))+'</div>'+
        '<div class="rc-bar-track"><div class="rc-bar-fill" style="width:'+pct+'%"></div>'+thumbInner+'</div>'+
        '<div class="rc-bar-cnt">'+g.count+'</div>'+
        '</div>';
    }).join('');
  }

  function renderStats(){
    var data = filtered;

    /* KPI */
    var exhibits = data.filter(function(r){ return r.Category === 'Экспонаты'; }).length;
    var collages = data.filter(function(r){ return r.Category === 'Коллажи'; }).length;
    document.getElementById('rc-stats-kpi').innerHTML =
      kpiCard(data.length, 'Всего записей') +
      kpiCard(exhibits, 'Экспонатов') +
      kpiCard(collages, 'Коллажей');

    var charts = '';

    /* donuts: объект (большой) + страна и музей (малые) справа */
    var byObj     = groupBy(data, 'Object');
    var byCountry = groupBy(data, 'Country');
    var byMuseum  = groupBy(data, 'Museum');

    var donutsHtml = '<div class="stats-chart-card wide"><div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;">';

    if (byObj.length) {
      var d1 = renderDonut(byObj, 280, true, 2, 5);
      donutsHtml += '<div><h3 style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9a8c70;margin-bottom:14px;font-weight:normal;">По типу объекта</h3>'+
        '<div class="rc-donut-wrap">'+d1+'</div></div>';
    }

    var smallDonuts = '';
    if (byCountry.length) {
      var d2 = renderDonut(byCountry, 140, true);
      smallDonuts += '<div><h3 style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9a8c70;margin-bottom:14px;font-weight:normal;">По стране производителя</h3>'+
        '<div class="rc-donut-wrap">'+d2+'</div></div>';
    }
    if (byMuseum.length > 1) {
      var d3 = renderDonut(byMuseum, 140, false);
      smallDonuts += '<div><h3 style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#9a8c70;margin-bottom:14px;font-weight:normal;">По музею</h3>'+
        '<div class="rc-donut-wrap">'+d3+'</div></div>';
    }
    if (smallDonuts) {
      donutsHtml += '<div style="display:flex;flex-direction:column;gap:16px;justify-content:space-between;">'+smallDonuts+'</div>';
    }

    donutsHtml += '</div></div>';
    charts += donutsHtml;

    /* bar: хронология по году */
    var yearMap = {};
    data.forEach(function(r){
      var y = r.Year || ''; if (!y) return;
      if (!yearMap[y]) yearMap[y] = [];
      yearMap[y].push(r);
    });
    var yearGroups = Object.entries(yearMap)
      .map(function(e){ return { label: e[0], count: e[1].length, records: e[1] }; })
      .sort(function(a,b){ return b.label - a.label; });
    if (yearGroups.length) {
      charts += chartCard('Хронология объектов', '<div class="rc-bars">'+renderBars(yearGroups)+'</div>', true);
    }

    document.getElementById('rc-stats-charts').innerHTML = charts;
  }

  function kpiCard(val, lbl){
    return '<div class="stats-kpi-card"><div class="kpi-val">'+val+'</div><div class="kpi-lbl">'+lbl+'</div></div>';
  }

  function chartCard(title, body, wide){
    return '<div class="stats-chart-card'+(wide?' wide':'')+'"><h3>'+title+'</h3>'+body+'</div>';
  }

  function renderPagination(totalPages){
    var el = document.getElementById('rc-pagination');
    el.innerHTML = '';
    if (totalPages <= 1) return;

    var prev = document.createElement('button');
    prev.className = 'pg-btn'; prev.textContent = '←'; prev.disabled = currentPage === 1;
    prev.onclick = function(){ currentPage--; renderPage(); scrollTo(0,0); };
    el.appendChild(prev);

    for (var p = 1; p <= totalPages; p++){
      (function(p){
        var btn = document.createElement('button');
        btn.className = 'pg-btn' + (p === currentPage ? ' active' : '');
        btn.textContent = p;
        btn.onclick = function(){ currentPage = p; renderPage(); scrollTo(0,0); };
        el.appendChild(btn);
      })(p);
    }

    var next = document.createElement('button');
    next.className = 'pg-btn'; next.textContent = '→'; next.disabled = currentPage === totalPages;
    next.onclick = function(){ currentPage++; renderPage(); scrollTo(0,0); };
    el.appendChild(next);
  }

  function glowSrc(r){
    var src = r.zones && r.zones.exhibit_video && r.zones.exhibit_video.source;
    return src ? CDN + '/' + src : null;
  }

  var _MUSEUM_SLUGS = {};

  function _loadMuseumSlugs() {
    fetch(CDN + '/museums.json?_=' + Date.now())
      .then(function(r){ return r.ok ? r.json() : []; })
      .then(function(list){
        list.forEach(function(m){ if (m.name && m.id) _MUSEUM_SLUGS[m.name] = m.id; });
      })
      .catch(function(){});
  }

  function previewSrc(r, suffix) {
    var slug = _MUSEUM_SLUGS[r.Museum] || '';
    var sfx  = suffix || '';
    if (slug) return CDN + '/exhibits/' + slug + '/previews/' + r.id + sfx + '_pr.webm';
    return CDN + '/previews/' + r.id + sfx + '_pr.webm'; // legacy fallback
  }

  function esc(s){
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
}());
//]]>
</script>
