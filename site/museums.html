<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museums Editor — Roads of Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'PT Sans', Arial, sans-serif;
  background: #080806;
  color: #c8c0a8;
  font-size: 14px;
  min-height: 100vh;
}

.rot-site-header {
  padding: 14px 24px;
  border-bottom: 1px solid #1a1a0e;
  display: flex;
  align-items: center;
  gap: 16px;
}
.rot-site-header a { text-decoration: none; }
.rot-site-title { font-size: 18px; font-weight: 700; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; }
.rot-site-sub { font-size: 11px; letter-spacing: 1.5px; color: #6a5f40; text-transform: uppercase; }
.rot-site-nav { margin-left: auto; display: flex; gap: 16px; }
.rot-site-nav a {
  font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
  color: #9a8c70; text-decoration: none; padding: 4px 10px;
  border: 1px solid transparent; border-radius: 3px; transition: color .15s, border-color .15s;
}
.rot-site-nav a:hover { color: #c9a84c; border-color: #4a3f20; }

.toolbar {
  padding: 12px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  border-bottom: 1px solid #1a1a12;
  flex-wrap: wrap;
}

.btn {
  padding: 6px 14px;
  border: 1px solid #2a2510;
  border-radius: 4px;
  background: #12120c;
  color: #c8c0a8;
  cursor: pointer;
  font-size: 13px;
  font-family: 'PT Sans', sans-serif;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover { background: #1a1a10; border-color: #4a3f20; }
.btn.primary { background: #1a2e12; border-color: #2e6e2e; color: #8fda8f; }
.btn.primary:hover { background: #203a18; }
.btn.danger { background: #2e1212; border-color: #6e2e2e; color: #da8f8f; }
.btn.danger:hover { background: #3a1818; }
.btn.sync-active { background: #203a18; border-color: #4a9e4a; color: #8fda8f; }

.count { font-size: 12px; color: #6a5f40; margin-left: 4px; }
.sync-hint { font-size: 11px; color: #4a3f20; margin-left: auto; font-style: italic; }
.sync-hint code { color: #5a8a5a; font-style: normal; }

/* TABLE */
.table-wrap {
  overflow-x: auto;
  padding: 0 24px;
  margin-top: 16px;
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }

thead th {
  background: #0d0d08;
  color: #9a8c70;
  font-weight: 600;
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid #2a2510;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 0;
}
thead th:hover { color: #c8c0a8; }
thead th.nosort { cursor: default; }
thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 10px; }
thead th.sorted .sort-icon { opacity: 1; color: #8fda8f; }

tbody tr { border-bottom: 1px solid #131309; cursor: pointer; transition: background 0.1s; }
tbody tr:hover { background: #0d0d08; }
tbody tr.selected { background: #1a2a12; border-left: 3px solid #4a9e4a; }

td { padding: 7px 10px; vertical-align: middle; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.dim { color: #4a3f20; }
td.center { text-align: center; }

.thumb-cell { width: 52px; padding: 4px 8px; }
.thumb-cell img { width: 40px; height: 28px; object-fit: cover; border-radius: 2px; display: block; border: 1px solid #2a2510; }
.thumb-placeholder { width: 40px; height: 28px; background: #0d0d08; border-radius: 2px; display: block; border: 1px solid #1a1a0e; }

.featured-badge { color: #c9a84c; font-size: 14px; }
.stars { color: #c9a84c; }
.stars.empty { color: #2a2510; }

/* FORM */
.form-section {
  margin: 24px 24px 40px;
  background: #0d0d08;
  border: 1px solid #2a2510;
  border-radius: 6px;
  padding: 20px 24px;
}
.form-section h2 {
  font-size: 13px; font-weight: 700; color: #9a8c70;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 18px; padding-bottom: 10px;
  border-bottom: 1px solid #1e1e10;
  display: flex; align-items: center; gap: 12px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
}
.form-grid .full { grid-column: 1 / -1; }
.form-grid .half { grid-column: span 2; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 10px; color: #6a5f40; letter-spacing: 0.08em; text-transform: uppercase; }
.field input, .field textarea {
  background: #080806; border: 1px solid #2a2510; border-radius: 3px;
  color: #c8c0a8; padding: 7px 9px; font-size: 13px; font-family: 'PT Sans', sans-serif;
  transition: border-color 0.15s; width: 100%;
}
.field input:focus, .field textarea:focus { outline: none; border-color: #8a6f2e; }
.field textarea { resize: vertical; min-height: 80px; }

.photo-field { display: flex; flex-direction: column; gap: 5px; }
.photo-field label { font-size: 10px; color: #6a5f40; letter-spacing: 0.08em; text-transform: uppercase; }
.photo-row { display: flex; gap: 8px; align-items: flex-start; }
.photo-preview {
  width: 80px; height: 56px; object-fit: cover; border-radius: 3px;
  background: #0d0d08; border: 1px solid #2a2510; flex-shrink: 0; display: block;
}
.photo-preview.empty { opacity: 0; }
.photo-row input {
  flex: 1; background: #080806; border: 1px solid #2a2510; border-radius: 3px;
  color: #c8c0a8; padding: 7px 9px; font-size: 13px; font-family: 'PT Sans', sans-serif;
  transition: border-color 0.15s;
}
.photo-row input:focus { outline: none; border-color: #8a6f2e; }

.rating-field { display: flex; flex-direction: column; gap: 5px; }
.rating-field label { font-size: 10px; color: #6a5f40; letter-spacing: 0.08em; text-transform: uppercase; }
.star-picker { display: flex; gap: 4px; margin-top: 2px; }
.star-picker .star { font-size: 22px; cursor: pointer; color: #2a2510; transition: color 0.1s, transform 0.1s; line-height: 1; }
.star-picker .star:hover { transform: scale(1.15); }
.star-picker .star.on { color: #c9a84c; }

.featured-field { display: flex; flex-direction: column; gap: 8px; }
.featured-field label.top { font-size: 10px; color: #6a5f40; letter-spacing: 0.08em; text-transform: uppercase; }
.featured-toggle {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 4px; cursor: pointer;
  border: 1px solid #2a2510; background: #080806;
  transition: background 0.15s, border-color 0.15s; user-select: none;
}
.featured-toggle:hover { background: #0d0d08; }
.featured-toggle.on { background: #221c04; border-color: #6a5800; }
.featured-toggle .icon { font-size: 18px; }
.featured-toggle .label { font-size: 13px; color: #6a5f40; }
.featured-toggle.on .label { color: #c9a84c; }

.form-actions {
  display: flex; gap: 8px; margin-top: 18px;
  padding-top: 16px; border-top: 1px solid #1a1a0e; align-items: center;
}
.form-actions .spacer { flex: 1; }
.id-display { font-size: 11px; color: #4a3f20; font-family: monospace; margin-left: 4px; }
.slug-badge {
  display: inline-block; font-size: 11px; font-family: monospace;
  color: #8fda8f; background: #1a2e1a; border: 1px solid #2e4e2e;
  border-radius: 3px; padding: 2px 7px; margin-left: 10px; vertical-align: middle;
  opacity: 0; transition: opacity .15s;
}
.slug-badge.visible { opacity: 1; }

.empty-state { text-align: center; padding: 48px; color: #2a2510; font-size: 13px; }

.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1a2e12; border: 1px solid #2e6e2e; color: #8fda8f;
  padding: 10px 18px; border-radius: 5px; font-size: 13px;
  opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999;
}
.toast.show { opacity: 1; }
.toast.err { background: #2e1212; border-color: #6e2e2e; color: #da8f8f; }
</style>
</head>
<body>

<header class="rot-site-header">
  <a href="/">
    <div class="rot-site-title">Roads of Times</div>
  </a>
  <div class="rot-site-sub">Museums Editor</div>
  <nav class="rot-site-nav">
    <a href="/index.html">⊞ Каталог</a>
  </nav>
</header>

<div class="toolbar">
  <button class="btn primary" onclick="newRecord()">+ Добавить музей</button>
  <button class="btn" onclick="downloadJSON()">↓ Скачать JSON</button>
  <button class="btn" id="btn-save-site" onclick="saveToFile()">⟳ Сохранить в museums.json</button>
  <span class="count" id="count"></span>
  <span class="sync-hint" id="sync-hint">Выбери локальный <code>site/museums.json</code> один раз — дальше автосинк при каждом сохранении</span>
</div>

<div class="table-wrap">
  <table id="museums-table">
    <thead>
      <tr>
        <th class="nosort" style="width:52px"></th>
        <th onclick="sortBy('name')">Музей <span class="sort-icon">▲</span></th>
        <th onclick="sortBy('city')">Город <span class="sort-icon">▲</span></th>
        <th onclick="sortBy('country')">Страна <span class="sort-icon">▲</span></th>
        <th onclick="sortBy('year_visited')">Год <span class="sort-icon">▲</span></th>
        <th onclick="sortBy('year_founded')">Основан <span class="sort-icon">▲</span></th>
        <th onclick="sortBy('rating')">Рейтинг <span class="sort-icon">▲</span></th>
        <th onclick="sortBy('ticket_price')">Билет <span class="sort-icon">▲</span></th>
        <th class="nosort" style="width:60px; text-align:center">Реком.</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div id="empty-state" class="empty-state" style="display:none">Нет записей. Нажмите «+ Добавить музей».</div>
</div>

<div class="form-section" id="form-section" style="display:none">
  <h2 id="form-title">Редактирование</h2>
  <div class="form-grid">

    <div class="field half">
      <label>Название музея <span class="slug-badge" id="slug-badge"></span></label>
      <input id="f-name" type="text" placeholder="Deutsches Panzermuseum" oninput="syncId()">
    </div>
    <div class="field">
      <label>Город</label>
      <input id="f-city" type="text" placeholder="Munster">
    </div>

    <div class="field">
      <label>Страна</label>
      <input id="f-country" type="text" placeholder="Германия">
    </div>
    <div class="field">
      <label>Год посещения</label>
      <input id="f-year_visited" type="number" placeholder="2026" min="1800" max="2100">
    </div>
    <div class="field">
      <label>Год основания</label>
      <input id="f-year_founded" type="number" placeholder="1983" min="1000" max="2100">
    </div>

    <div class="rating-field">
      <label>Рейтинг</label>
      <div class="star-picker" id="star-picker">
        <span class="star" data-v="1" onclick="setRating(1)">★</span>
        <span class="star" data-v="2" onclick="setRating(2)">★</span>
        <span class="star" data-v="3" onclick="setRating(3)">★</span>
        <span class="star" data-v="4" onclick="setRating(4)">★</span>
        <span class="star" data-v="5" onclick="setRating(5)">★</span>
      </div>
    </div>
    <div class="field">
      <label>Стоимость билета</label>
      <input id="f-ticket_price" type="text" placeholder="€8 / бесплатно">
    </div>
    <div class="field">
      <label>Часы работы</label>
      <input id="f-working_hours" type="text" placeholder="Вт–Вс 10:00–18:00">
    </div>

    <div class="featured-field">
      <label class="top">Виджет «Рекомендую»</label>
      <div class="featured-toggle" id="featured-toggle" onclick="toggleFeatured()">
        <span class="icon">★</span>
        <span class="label" id="featured-label">Не выбран</span>
      </div>
    </div>

    <div class="photo-field full">
      <label>Фото (URL)</label>
      <div class="photo-row">
        <img id="photo-preview" class="photo-preview empty" src="" alt="">
        <input id="f-photo" type="url" placeholder="https://..." oninput="updatePhotoPreview()">
      </div>
    </div>

    <div class="field full">
      <label>Описание</label>
      <textarea id="f-description" placeholder="Краткое описание музея..."></textarea>
    </div>

    <div class="field half">
      <label>Сайт</label>
      <input id="f-website" type="url" placeholder="https://www.museum.de">
    </div>
    <div class="field half">
      <label>Карта (Google Maps)</label>
      <input id="f-map_url" type="url" placeholder="https://maps.app.goo.gl/...">
    </div>
    <div class="field full">
      <label>Страница на сайте (landing)</label>
      <input id="f-landing_url" type="url" placeholder="https://www.roadsoftimes.com/...">
    </div>

  </div>
  <div class="form-actions">
    <span class="id-display" id="id-display"></span>
    <div class="spacer"></div>
    <button class="btn danger" id="btn-delete" onclick="deleteRecord()">Удалить</button>
    <button class="btn" onclick="cancelEdit()">Отмена</button>
    <button class="btn primary" onclick="saveRecord()">Сохранить</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var DATA = [];
var editingId = null;
var currentRating = null;
var currentFeatured = false;
var sortCol = 'name';
var sortAsc = true;

fetch('/museums.json?_=' + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(d){ DATA = d; render(); })
  .catch(function(){
    DATA = [];
    render();
    toast('Не удалось загрузить museums.json', true);
  });

function slugify(s) {
  return s.toLowerCase()
    .replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e')
    .replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o')
    .replace(/[ùúûü]/g,'u').replace(/[ñ]/g,'n')
    .replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')
    .replace(/_+/g,'_').replace(/^_|_$/g,'');
}

function makeId(name) {
  var base = slugify(name) || 'museum';
  var existing = DATA.filter(function(r){ return r.id !== editingId; }).map(function(r){ return r.id; });
  if (!existing.includes(base)) return base;
  var i = 2;
  while (existing.includes(base + '_' + i)) i++;
  return base + '_' + i;
}

function render() {
  var sorted = DATA.slice().sort(function(a, b) {
    var va = a[sortCol], vb = b[sortCol];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'number') return sortAsc ? va - vb : vb - va;
    return sortAsc
      ? String(va).localeCompare(String(vb), 'ru')
      : String(vb).localeCompare(String(va), 'ru');
  });

  var tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  document.getElementById('count').textContent = DATA.length + ' записей';
  document.getElementById('empty-state').style.display = DATA.length ? 'none' : 'block';

  sorted.forEach(function(r) {
    var tr = document.createElement('tr');
    if (r.id === editingId) tr.className = 'selected';
    tr.onclick = function() { openEdit(r.id); };

    var thumbHtml = r.photo
      ? '<img src="' + esc(r.photo) + '" alt="" loading="lazy">'
      : '<span class="thumb-placeholder"></span>';

    tr.innerHTML =
      '<td class="thumb-cell">' + thumbHtml + '</td>' +
      '<td>' + esc(r.name || '') + '</td>' +
      '<td>' + esc(r.city || '') + '</td>' +
      '<td>' + esc(r.country || '') + '</td>' +
      '<td>' + (r.year_visited || '<span class="dim">—</span>') + '</td>' +
      '<td>' + (r.year_founded || '<span class="dim">—</span>') + '</td>' +
      '<td>' + renderStars(r.rating) + '</td>' +
      '<td>' + esc(r.ticket_price || '') + '</td>' +
      '<td class="center">' + (r.featured ? '<span class="featured-badge">★</span>' : '') + '</td>';
    tbody.appendChild(tr);
  });

  document.querySelectorAll('thead th:not(.nosort)').forEach(function(th) {
    var col = th.getAttribute('onclick').replace("sortBy('","").replace("')","");
    th.classList.toggle('sorted', col === sortCol);
    var icon = th.querySelector('.sort-icon');
    if (icon) icon.textContent = (col === sortCol) ? (sortAsc ? '▲' : '▼') : '▲';
  });
}

function renderStars(rating) {
  if (!rating) return '<span class="dim">—</span>';
  var s = '';
  for (var i = 1; i <= 5; i++)
    s += '<span class="stars' + (i <= rating ? '' : ' empty') + '">★</span>';
  return s;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  render();
}

function openEdit(id) {
  var r = DATA.find(function(x){ return x.id === id; });
  if (!r) return;
  editingId = id;
  fillForm(r);
  document.getElementById('form-title').textContent = 'Редактирование';
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('form-section').style.display = '';
  document.getElementById('form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  render();
}

function newRecord() {
  editingId = null;
  fillForm({});
  document.getElementById('form-title').textContent = 'Новый музей';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('id-display').textContent = '';
  document.getElementById('form-section').style.display = '';
  document.getElementById('form-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.getElementById('f-name').focus();
  render();
}

function fillForm(r) {
  ['name','city','country','ticket_price','working_hours','description','website','map_url','landing_url','photo'].forEach(function(k){
    document.getElementById('f-' + k).value = r[k] || '';
  });
  ['year_visited','year_founded'].forEach(function(k){
    document.getElementById('f-' + k).value = r[k] != null ? r[k] : '';
  });
  currentRating = r.rating || null;
  updateStarUI();
  currentFeatured = !!r.featured;
  updateFeaturedUI();
  updatePhotoPreview();
  document.getElementById('id-display').textContent = r.id ? 'id: ' + r.id : '';
  setSlugBadge(r.id || '');
}

function syncId() {
  if (editingId) return;
  var name = document.getElementById('f-name').value;
  var slug = name ? makeId(name) : '';
  document.getElementById('id-display').textContent = slug ? 'id: ' + slug : '';
  setSlugBadge(editingId || slug);
}

function setSlugBadge(slug) {
  var el = document.getElementById('slug-badge');
  if (slug) { el.textContent = slug; el.classList.add('visible'); }
  else { el.textContent = ''; el.classList.remove('visible'); }
}

function setRating(v) {
  currentRating = (currentRating === v) ? null : v;
  updateStarUI();
}

function updateStarUI() {
  document.querySelectorAll('#star-picker .star').forEach(function(s) {
    s.classList.toggle('on', currentRating != null && parseInt(s.dataset.v) <= currentRating);
  });
}

function toggleFeatured() {
  currentFeatured = !currentFeatured;
  updateFeaturedUI();
}

function updateFeaturedUI() {
  var toggle = document.getElementById('featured-toggle');
  var label = document.getElementById('featured-label');
  toggle.classList.toggle('on', currentFeatured);
  label.textContent = currentFeatured ? 'Рекомендую (виджет)' : 'Не выбран';
}

function updatePhotoPreview() {
  var url = document.getElementById('f-photo').value.trim();
  var img = document.getElementById('photo-preview');
  if (url) { img.src = url; img.classList.remove('empty'); }
  else { img.src = ''; img.classList.add('empty'); }
}

function getFormData() {
  var name = document.getElementById('f-name').value.trim();
  return {
    id: editingId || makeId(name),
    name: name,
    city: document.getElementById('f-city').value.trim(),
    country: document.getElementById('f-country').value.trim(),
    year_visited: parseInt(document.getElementById('f-year_visited').value) || null,
    description: document.getElementById('f-description').value.trim(),
    ticket_price: document.getElementById('f-ticket_price').value.trim(),
    working_hours: document.getElementById('f-working_hours').value.trim(),
    year_founded: parseInt(document.getElementById('f-year_founded').value) || null,
    website: document.getElementById('f-website').value.trim(),
    map_url: document.getElementById('f-map_url').value.trim(),
    landing_url: document.getElementById('f-landing_url').value.trim(),
    photo: document.getElementById('f-photo').value.trim(),
    rating: currentRating,
    featured: currentFeatured
  };
}

function saveRecord() {
  var rec = getFormData();
  if (!rec.name) { toast('Укажите название музея', true); return; }

  if (rec.featured) {
    DATA.forEach(function(r){ if (r.id !== rec.id) r.featured = false; });
  }

  if (editingId) {
    var idx = DATA.findIndex(function(r){ return r.id === editingId; });
    if (idx !== -1) DATA[idx] = rec;
  } else {
    DATA.push(rec);
  }
  editingId = rec.id;
  document.getElementById('id-display').textContent = 'id: ' + rec.id;
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('form-title').textContent = 'Редактирование';
  render();

  if (siteFileHandle) {
    _writeSiteFile()
      .then(function(){ toast('Сохранено → ' + siteFileHandle.name); })
      .catch(function(e){ toast('Сохранено локально, ошибка записи: ' + e.message, true); });
  } else {
    toast('Сохранено в память. Нажмите «Сохранить в museums.json» для записи на диск.');
  }
}

function deleteRecord() {
  if (!editingId) return;
  var r = DATA.find(function(x){ return x.id === editingId; });
  if (!r) return;
  if (!confirm('Удалить «' + (r.name || editingId) + '»?')) return;
  DATA = DATA.filter(function(x){ return x.id !== editingId; });
  editingId = null;
  document.getElementById('form-section').style.display = 'none';
  render();
  if (siteFileHandle) {
    _writeSiteFile()
      .then(function(){ toast('Удалено → ' + siteFileHandle.name); })
      .catch(function(e){ toast('Удалено из памяти, ошибка записи: ' + e.message, true); });
  } else {
    toast('Запись удалена из памяти.');
  }
}

function cancelEdit() {
  editingId = null;
  document.getElementById('form-section').style.display = 'none';
  render();
}

function downloadJSON() {
  var json = JSON.stringify(DATA, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'museums.json';
  a.click();
}

var siteFileHandle = null;

async function _writeSiteFile() {
  if (!siteFileHandle) return false;
  var json = JSON.stringify(DATA, null, 2);
  var writable = await siteFileHandle.createWritable();
  await writable.write(json);
  await writable.close();
  return true;
}

function _setSiteHandle(handle) {
  siteFileHandle = handle;
  var btn = document.getElementById('btn-save-site');
  btn.textContent = '⟳ Автосинк: ' + handle.name;
  btn.className = 'btn sync-active';
  document.getElementById('sync-hint').innerHTML =
    'Автосинк активен → <code>' + handle.name + '</code> · каждое «Сохранить» пишет на диск';
}

async function saveToFile() {
  try {
    if (!siteFileHandle) {
      var handles = await window.showOpenFilePicker({
        id: 'museums-site',
        startIn: 'documents',
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
        excludeAcceptAllOption: true,
        multiple: false
      });
      _setSiteHandle(handles[0]);
    }
    await _writeSiteFile();
    toast('Записано в ' + siteFileHandle.name);
  } catch(e) {
    if (e.name !== 'AbortError') toast('Ошибка: ' + e.message, true);
  }
}

function toast(msg, isErr) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
